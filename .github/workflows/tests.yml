name: brew test-bot

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-bot:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Homebrew
        run: |
          echo "$(brew --repository)/bin" >> "$GITHUB_PATH"
          echo "$(brew --repository)/Library/Taps/homebrew/homebrew-core/bin" >> "$GITHUB_PATH"
      - run: brew test-bot --only-formulae --skip-recursive-dependents
